version: '3.8'

services:
  consignment-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consignment-frontend
    ports:
      - "${SERVER_PORT:-8800}:8800"
    env_file:
      - .env
    environment:
      # These will be read from the .env file automatically by docker-compose
      - APP_MODE=${APP_MODE:-dev}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    networks:
      - consignment_network

networks:
  consignment_network:
    driver: bridge
