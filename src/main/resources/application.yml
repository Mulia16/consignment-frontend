server:
  port: ${SERVER_PORT:8800}

spring:
  application:
    name: consignment-frontend
  mvc:
    view:
      prefix: /WEB-INF/jsp/
      suffix: .jsp
  web:
    resources:
      static-locations: /static/

# API Service Configuration
# Aligned with backend API architecture (see plans/api-endpoint.md)
# Services:
# - AUTH: Auth Service (/auth) - 3 endpoints
# - CONSIGNMENT: Consignment Service (/api) - 56 endpoints
# - INVENTORY: Inventory Service (/api/v1/inventory) - 2 endpoints
# - BATCH: Batch Job Service (/batch) - 2 endpoints
app:
  mode: ${APP_MODE:dev}
  gateway:
    base-url: ${GATEWAY_BASE_URL:http://localhost:8080}
  services:
    auth: ${SERVICE_AUTH:/auth}
    consignment: ${SERVICE_CONSIGNMENT:/api}
    inventory: ${SERVICE_INVENTORY:/api/v1/inventory}
    batch: ${SERVICE_BATCH:/batch}
